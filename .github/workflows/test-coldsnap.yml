name: Test coldsnap upload speed
on:
  workflow_dispatch:
jobs:
  test-coldsnap:
    name: "coldsnap: ${{ matrix.label }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "default endpoint, default retries"
            endpoint_flag: ""
            max_attempts: ""
          - label: "default endpoint, max_attempts=1"
            endpoint_flag: ""
            max_attempts: "1"
          - label: "api.aws endpoint, default retries"
            endpoint_flag: "--endpoint https://ebs.us-east-1.api.aws"
            max_attempts: ""
          - label: "api.aws endpoint, max_attempts=1"
            endpoint_flag: "--endpoint https://ebs.us-east-1.api.aws"
            max_attempts: "1"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: DeterminateSystems/nix-installer-action@7993355175c2765e5733dae74f3e0786fe0e5c4f # v12
      - name: Download AMI from Hydra
        id: download_ami
        run: |
          set -o pipefail
          build_id=$(curl -sSfL -H 'Accept: application/json' https://hydra.nixos.org/job/nixos/release-25.05/tested/latest-finished | jq -r '.id')
          out=$(curl -sSfL -H 'Accept: application/json' "https://hydra.nixos.org/build/${build_id}/constituents" | jq -r '.[] | select(.job == "nixos.amazonImage.x86_64-linux") | .buildoutputs.out.path')
          nix-store --realise "$out" --add-root ./result
          echo "image_info=$out/nix-support/image-info.json" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Install tools
        run: |
          echo "::group::Installing coldsnap and qemu"
          nix profile install nixpkgs#coldsnap nixpkgs#qemu
          echo "::endgroup::"
      - name: Convert VHD to raw
        run: |
          image_file=$(jq -r '.file' < '${{ steps.download_ami.outputs.image_info }}')
          qemu-img convert -O raw "$image_file" /tmp/nixos-test.raw
          ls -lh /tmp/nixos-test.raw
          stat -c "Exact bytes: %s" /tmp/nixos-test.raw

      # ========== DIAGNOSTICS ==========

      - name: Runner and network info
        run: |
          echo "=== Runner ==="
          uname -r
          nproc
          free -h | grep Mem
          echo ""
          echo "=== Public IP ==="
          curl -s https://ipinfo.io | jq '{ip, city, region, org}'
          echo ""
          echo "=== HTTPS latency to EBS endpoint (default) ==="
          for i in 1 2 3; do
            curl -so /dev/null -w "  $i: dns=%{time_namelookup} connect=%{time_connect} tls=%{time_appconnect} total=%{time_total}\n" https://ebs.us-east-1.amazonaws.com/ 2>/dev/null || true
          done
          echo ""
          echo "=== HTTPS latency to EBS endpoint (api.aws) ==="
          for i in 1 2 3; do
            curl -so /dev/null -w "  $i: dns=%{time_namelookup} connect=%{time_connect} tls=%{time_appconnect} total=%{time_total}\n" https://ebs.us-east-1.api.aws/ 2>/dev/null || true
          done
          echo ""
          echo "=== HTTPS latency to S3 ==="
          for i in 1 2 3; do
            curl -so /dev/null -w "  $i: dns=%{time_namelookup} connect=%{time_connect} tls=%{time_appconnect} total=%{time_total}\n" https://s3.us-east-1.amazonaws.com/ 2>/dev/null || true
          done
          echo ""
          echo "=== Download bandwidth (kernel.org, ~130MB) ==="
          curl -so /dev/null -w "Speed: %{speed_download} bytes/sec, Time: %{time_total}s\n" https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.1.tar.xz || true

      # ========== VERIFY COLDSNAP FLAGS ==========

      - name: Verify coldsnap command
        run: |
          echo "=== coldsnap help ==="
          coldsnap --help
          echo ""
          echo "=== coldsnap upload help ==="
          coldsnap upload --help
          echo ""
          echo "=== Exact command that will run ==="
          echo "coldsnap --verbose ${{ matrix.endpoint_flag }} upload /tmp/nixos-test.raw"

      # ========== S3 CONTROL ==========

      - name: "Control: S3 upload same 4.1G file"
        run: |
          BUCKET="coldsnap-test-$(date +%s)-$RANDOM"
          aws s3 mb "s3://$BUCKET" --region us-east-1
          echo "Uploading 4.1G raw image to S3..."
          start=$SECONDS
          aws s3 cp /tmp/nixos-test.raw "s3://$BUCKET/nixos-test.raw" --region us-east-1 2>&1
          elapsed=$(( SECONDS - start ))
          raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
          throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
          echo "S3 upload: ${elapsed}s (~${throughput} MB/s)"
          aws s3 rb "s3://$BUCKET" --force --region us-east-1

      # ========== COLDSNAP UPLOADS (3 runs) ==========

      - name: "Coldsnap upload run 1 — ${{ matrix.label }}"
        timeout-minutes: 10
        env:
          AWS_MAX_ATTEMPTS: ${{ matrix.max_attempts }}
          RUST_BACKTRACE: "full"
          RUST_LOG: "coldsnap=trace,aws_smithy_runtime=debug,aws_sdk_ebs=debug"
        run: |
          set +e  # Don't exit on error — we need to dump logs

          echo "=== Config ==="
          echo "AWS_MAX_ATTEMPTS: ${AWS_MAX_ATTEMPTS:-default}"
          echo "Endpoint flag: '${{ matrix.endpoint_flag }}'"
          echo "RUST_BACKTRACE: $RUST_BACKTRACE"
          echo "RUST_LOG: $RUST_LOG"
          echo ""

          # NOTE: --endpoint is a TOP-LEVEL flag, not a subcommand flag
          # Correct: coldsnap --verbose --endpoint <url> upload <file>
          # Wrong:   coldsnap --verbose upload --endpoint <url> <file>
          CMD="coldsnap --verbose ${{ matrix.endpoint_flag }} upload /tmp/nixos-test.raw"
          echo "Command: $CMD"
          echo ""

          # Network monitor
          bash -c 'prev_rx=0; prev_tx=0; while true; do
            line=$(cat /proc/net/dev | grep eth0)
            rx=$(echo "$line" | awk "{print \$2}")
            tx=$(echo "$line" | awk "{print \$10}")
            drx=$(( (rx - prev_rx) / 1024 / 1024 ))
            dtx=$(( (tx - prev_tx) / 1024 / 1024 ))
            if [ $prev_rx -ne 0 ]; then
              echo "$(date -u +%H:%M:%S) rx=${drx}MB/5s tx=${dtx}MB/5s"
            fi
            prev_rx=$rx; prev_tx=$tx
            sleep 5
          done' > /tmp/net-monitor.log 2>&1 &
          NET_PID=$!

          echo "=== Starting upload at $(date -u) ==="
          start=$SECONDS

          # Run coldsnap, capture stdout and stderr separately
          $CMD > /tmp/coldsnap-stdout.log 2>/tmp/coldsnap-stderr.log &
          PID=$!

          # Monitor loop
          while kill -0 $PID 2>/dev/null; do
            elapsed=$(( SECONDS - start ))
            conns=$(ss -tn state established 2>/dev/null | grep -cE "443" || echo "0")
            net_line=$(tail -1 /tmp/net-monitor.log 2>/dev/null || echo "n/a")
            stderr_lines=$(wc -l < /tmp/coldsnap-stderr.log 2>/dev/null || echo "0")
            echo "[$(date -u +%H:%M:%S)] ${elapsed}s | port-443-conns=$conns | stderr_lines=$stderr_lines | $net_line"
            sleep 10
          done

          wait $PID
          STATUS=$?
          elapsed=$(( SECONDS - start ))
          kill $NET_PID 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "EXIT CODE: $STATUS"
          echo "WALL TIME: ${elapsed}s"
          echo "============================================"

          if [ $STATUS -eq 0 ]; then
            snap_id=$(cat /tmp/coldsnap-stdout.log | tr -d '[:space:]')
            raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
            throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
            echo "Throughput: ~${throughput} MB/s"
            echo "Snapshot: $snap_id"
            echo ""
            aws ec2 delete-snapshot --snapshot-id "$snap_id" 2>/dev/null || true
          fi

          echo ""
          echo "=== STDOUT ==="
          cat /tmp/coldsnap-stdout.log 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== STDERR (all, up to 500 lines) ==="
          head -500 /tmp/coldsnap-stderr.log 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== STDERR line count ==="
          wc -l /tmp/coldsnap-stderr.log 2>/dev/null || echo "0"
          echo ""
          echo "=== Network throughput log ==="
          cat /tmp/net-monitor.log 2>/dev/null || echo "(empty)"

          # Exit with original status AFTER dumping all logs
          exit $STATUS

      - name: "Coldsnap upload run 2 — ${{ matrix.label }}"
        if: success()
        timeout-minutes: 10
        env:
          AWS_MAX_ATTEMPTS: ${{ matrix.max_attempts }}
          RUST_BACKTRACE: "full"
          RUST_LOG: "coldsnap=trace,aws_smithy_runtime=debug,aws_sdk_ebs=debug"
        run: |
          set +e

          CMD="coldsnap --verbose ${{ matrix.endpoint_flag }} upload /tmp/nixos-test.raw"
          echo "Command: $CMD"

          bash -c 'prev_rx=0; prev_tx=0; while true; do
            line=$(cat /proc/net/dev | grep eth0)
            rx=$(echo "$line" | awk "{print \$2}")
            tx=$(echo "$line" | awk "{print \$10}")
            drx=$(( (rx - prev_rx) / 1024 / 1024 ))
            dtx=$(( (tx - prev_tx) / 1024 / 1024 ))
            if [ $prev_rx -ne 0 ]; then
              echo "$(date -u +%H:%M:%S) rx=${drx}MB/5s tx=${dtx}MB/5s"
            fi
            prev_rx=$rx; prev_tx=$tx
            sleep 5
          done' > /tmp/net-monitor.log 2>&1 &
          NET_PID=$!

          echo "=== Starting upload at $(date -u) ==="
          start=$SECONDS
          $CMD > /tmp/coldsnap-stdout.log 2>/tmp/coldsnap-stderr.log &
          PID=$!

          while kill -0 $PID 2>/dev/null; do
            elapsed=$(( SECONDS - start ))
            conns=$(ss -tn state established 2>/dev/null | grep -cE "443" || echo "0")
            net_line=$(tail -1 /tmp/net-monitor.log 2>/dev/null || echo "n/a")
            stderr_lines=$(wc -l < /tmp/coldsnap-stderr.log 2>/dev/null || echo "0")
            echo "[$(date -u +%H:%M:%S)] ${elapsed}s | port-443-conns=$conns | stderr_lines=$stderr_lines | $net_line"
            sleep 10
          done

          wait $PID
          STATUS=$?
          elapsed=$(( SECONDS - start ))
          kill $NET_PID 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "EXIT CODE: $STATUS"
          echo "WALL TIME: ${elapsed}s"
          echo "============================================"

          if [ $STATUS -eq 0 ]; then
            snap_id=$(cat /tmp/coldsnap-stdout.log | tr -d '[:space:]')
            raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
            throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
            echo "Throughput: ~${throughput} MB/s"
            echo "Snapshot: $snap_id"
            aws ec2 delete-snapshot --snapshot-id "$snap_id" 2>/dev/null || true
          fi

          echo ""
          echo "=== STDOUT ==="
          cat /tmp/coldsnap-stdout.log 2>/dev/null || echo "(empty)"
          echo "=== STDERR (all, up to 500 lines) ==="
          head -500 /tmp/coldsnap-stderr.log 2>/dev/null || echo "(empty)"
          echo "=== STDERR line count ==="
          wc -l /tmp/coldsnap-stderr.log 2>/dev/null || echo "0"
          echo "=== Network throughput log ==="
          cat /tmp/net-monitor.log 2>/dev/null || echo "(empty)"

          exit $STATUS

      - name: "Coldsnap upload run 3 — ${{ matrix.label }}"
        if: success()
        timeout-minutes: 10
        env:
          AWS_MAX_ATTEMPTS: ${{ matrix.max_attempts }}
          RUST_BACKTRACE: "full"
          RUST_LOG: "coldsnap=trace,aws_smithy_runtime=debug,aws_sdk_ebs=debug"
        run: |
          set +e

          CMD="coldsnap --verbose ${{ matrix.endpoint_flag }} upload /tmp/nixos-test.raw"
          echo "Command: $CMD"

          bash -c 'prev_rx=0; prev_tx=0; while true; do
            line=$(cat /proc/net/dev | grep eth0)
            rx=$(echo "$line" | awk "{print \$2}")
            tx=$(echo "$line" | awk "{print \$10}")
            drx=$(( (rx - prev_rx) / 1024 / 1024 ))
            dtx=$(( (tx - prev_tx) / 1024 / 1024 ))
            if [ $prev_rx -ne 0 ]; then
              echo "$(date -u +%H:%M:%S) rx=${drx}MB/5s tx=${dtx}MB/5s"
            fi
            prev_rx=$rx; prev_tx=$tx
            sleep 5
          done' > /tmp/net-monitor.log 2>&1 &
          NET_PID=$!

          echo "=== Starting upload at $(date -u) ==="
          start=$SECONDS
          $CMD > /tmp/coldsnap-stdout.log 2>/tmp/coldsnap-stderr.log &
          PID=$!

          while kill -0 $PID 2>/dev/null; do
            elapsed=$(( SECONDS - start ))
            conns=$(ss -tn state established 2>/dev/null | grep -cE "443" || echo "0")
            net_line=$(tail -1 /tmp/net-monitor.log 2>/dev/null || echo "n/a")
            stderr_lines=$(wc -l < /tmp/coldsnap-stderr.log 2>/dev/null || echo "0")
            echo "[$(date -u +%H:%M:%S)] ${elapsed}s | port-443-conns=$conns | stderr_lines=$stderr_lines | $net_line"
            sleep 10
          done

          wait $PID
          STATUS=$?
          elapsed=$(( SECONDS - start ))
          kill $NET_PID 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "EXIT CODE: $STATUS"
          echo "WALL TIME: ${elapsed}s"
          echo "============================================"

          if [ $STATUS -eq 0 ]; then
            snap_id=$(cat /tmp/coldsnap-stdout.log | tr -d '[:space:]')
            raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
            throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
            echo "Throughput: ~${throughput} MB/s"
            echo "Snapshot: $snap_id"
            aws ec2 delete-snapshot --snapshot-id "$snap_id" 2>/dev/null || true
          fi

          echo ""
          echo "=== STDOUT ==="
          cat /tmp/coldsnap-stdout.log 2>/dev/null || echo "(empty)"
          echo "=== STDERR (all, up to 500 lines) ==="
          head -500 /tmp/coldsnap-stderr.log 2>/dev/null || echo "(empty)"
          echo "=== STDERR line count ==="
          wc -l /tmp/coldsnap-stderr.log 2>/dev/null || echo "0"
          echo "=== Network throughput log ==="
          cat /tmp/net-monitor.log 2>/dev/null || echo "(empty)"

          exit $STATUS
