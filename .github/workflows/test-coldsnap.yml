name: Test coldsnap upload speed
on:
  workflow_dispatch:
jobs:
  test-coldsnap:
    name: "coldsnap: ${{ matrix.label }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "64w, 1 client"
            workers: "64"
            shards: ""
            hedge: ""
          - label: "128w, 1 client"
            workers: "128"
            shards: ""
            hedge: ""
          - label: "128w, 8 shards"
            workers: "128"
            shards: "8"
            hedge: ""
          - label: "128w, 8 shards, hedge@2s"
            workers: "128"
            shards: "8"
            hedge: "2"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: DeterminateSystems/nix-installer-action@7993355175c2765e5733dae74f3e0786fe0e5c4f # v12
      - name: Download AMI from Hydra
        id: download_ami
        run: |
          set -o pipefail
          build_id=$(curl -sSfL -H 'Accept: application/json' https://hydra.nixos.org/job/nixos/release-25.05/tested/latest-finished | jq -r '.id')
          out=$(curl -sSfL -H 'Accept: application/json' "https://hydra.nixos.org/build/${build_id}/constituents" | jq -r '.[] | select(.job == "nixos.amazonImage.x86_64-linux") | .buildoutputs.out.path')
          nix-store --realise "$out" --add-root ./result
          echo "image_info=$out/nix-support/image-info.json" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Build patched coldsnap
        run: |
          echo "::group::Installing Rust toolchain and deps"
          nix profile install nixpkgs#cargo nixpkgs#rustc nixpkgs#pkg-config nixpkgs#openssl nixpkgs#qemu
          echo "::endgroup::"
          echo "::group::Cloning and patching coldsnap"
          git clone --depth 1 https://github.com/awslabs/coldsnap.git /tmp/coldsnap-patched
          cd /tmp/coldsnap-patched
          git apply "$GITHUB_WORKSPACE/coldsnap-v5.patch"
          echo "::endgroup::"
          echo "::group::Building coldsnap"
          cargo build --release 2>&1
          echo "::endgroup::"
          echo "Patched coldsnap built successfully"
          /tmp/coldsnap-patched/target/release/coldsnap upload --help
      - name: Convert VHD to raw
        run: |
          image_file=$(jq -r '.file' < '${{ steps.download_ami.outputs.image_info }}')
          qemu-img convert -O raw "$image_file" /tmp/nixos-test.raw
          ls -lh /tmp/nixos-test.raw
          stat -c "Exact bytes: %s" /tmp/nixos-test.raw

      - name: Runner and network info
        run: |
          echo "=== Runner ==="
          uname -r && nproc && free -h | grep Mem
          echo "=== Public IP ==="
          curl -s https://ipinfo.io | jq '{ip, city, region, org}'
          echo "=== EBS latency ==="
          for i in 1 2 3; do
            curl -so /dev/null -w "  $i: connect=%{time_connect} tls=%{time_appconnect} total=%{time_total}\n" https://ebs.us-east-1.amazonaws.com/ 2>/dev/null || true
          done

      - name: "Control: S3 upload same 4.1G file"
        run: |
          BUCKET="coldsnap-test-$(date +%s)-$RANDOM"
          aws s3 mb "s3://$BUCKET" --region us-east-1
          start=$SECONDS
          aws s3 cp /tmp/nixos-test.raw "s3://$BUCKET/nixos-test.raw" --region us-east-1 2>&1
          elapsed=$(( SECONDS - start ))
          raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
          throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
          echo "S3 upload: ${elapsed}s (~${throughput} MB/s)"
          aws s3 rb "s3://$BUCKET" --force --region us-east-1

      - name: "Coldsnap upload — ${{ matrix.label }}"
        timeout-minutes: 10
        env:
          AWS_MAX_ATTEMPTS: "1"
          RUST_BACKTRACE: "full"
          RUST_LOG: "coldsnap=info"
        run: |
          set +e

          COLDSNAP=/tmp/coldsnap-patched/target/release/coldsnap
          WORKERS="${{ matrix.workers }}"
          SHARDS="${{ matrix.shards }}"
          HEDGE="${{ matrix.hedge }}"

          FLAGS="--workers $WORKERS"
          if [ -n "$SHARDS" ]; then
            FLAGS="$FLAGS --client-shards $SHARDS"
          fi
          if [ -n "$HEDGE" ]; then
            FLAGS="$FLAGS --hedge-timeout $HEDGE"
          fi

          echo "=== Config ==="
          echo "Workers: $WORKERS"
          echo "Client shards: ${SHARDS:-1 (default)}"
          echo "Hedge timeout: ${HEDGE:-none}"
          echo "Timeouts: read=8s, attempt=15s, operation=90s"
          echo "SDK retries: 1 (disabled), block retries: 4"
          echo "Flags: $FLAGS"
          echo ""

          # Network monitor
          bash -c 'prev_tx=0; while true; do
            tx=$(awk "/eth0/ {print \$10}" /proc/net/dev)
            dtx=$(( (tx - prev_tx) / 1024 / 1024 ))
            if [ $prev_tx -ne 0 ]; then echo "$(date -u +%H:%M:%S) tx=${dtx}MB/5s"; fi
            prev_tx=$tx; sleep 5
          done' > /tmp/net-monitor.log 2>&1 &
          NET_PID=$!

          echo "=== Starting upload at $(date -u) ==="
          echo "Command: $COLDSNAP --verbose upload $FLAGS /tmp/nixos-test.raw"
          start=$SECONDS

          $COLDSNAP --verbose upload $FLAGS /tmp/nixos-test.raw > /tmp/coldsnap-stdout.log 2>/tmp/coldsnap-stderr.log &
          CSPID=$!

          # Monitor loop
          while kill -0 $CSPID 2>/dev/null; do
            elapsed=$(( SECONDS - start ))
            conns=$(ss -tn state established 2>/dev/null | grep -c "443" || echo "0")
            net_line=$(tail -1 /tmp/net-monitor.log 2>/dev/null || echo "n/a")
            stderr_lines=$(wc -l < /tmp/coldsnap-stderr.log 2>/dev/null || echo "0")
            echo "[$(date -u +%H:%M:%S)] ${elapsed}s | conns=$conns | stderr=$stderr_lines | $net_line"
            sleep 10
          done

          wait $CSPID
          STATUS=$?
          elapsed=$(( SECONDS - start ))
          kill $NET_PID 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "EXIT CODE: $STATUS"
          echo "WALL TIME: ${elapsed}s"
          if [ $STATUS -eq 0 ]; then
            snap_id=$(cat /tmp/coldsnap-stdout.log | tr -d '[:space:]')
            raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
            throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
            echo "Throughput: ~${throughput} MB/s"
            echo "Snapshot: $snap_id"
          fi
          echo "============================================"
          echo ""
          echo "=== STDOUT ==="
          cat /tmp/coldsnap-stdout.log 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== STDERR (full — includes histogram) ==="
          cat /tmp/coldsnap-stderr.log 2>/dev/null || echo "(empty)"
          echo "($(wc -l < /tmp/coldsnap-stderr.log 2>/dev/null || echo 0) total lines)"
          echo ""
          echo "=== Network throughput log ==="
          cat /tmp/net-monitor.log 2>/dev/null || echo "(empty)"

          if [ $STATUS -eq 0 ] && [ -n "$snap_id" ]; then
            aws ec2 delete-snapshot --snapshot-id "$snap_id" 2>/dev/null || true
          fi

          exit $STATUS
