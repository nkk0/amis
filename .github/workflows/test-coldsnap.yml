name: Test coldsnap upload speed
on:
  workflow_dispatch:
jobs:
  test-coldsnap:
    name: Test coldsnap upload (${{ matrix.system }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        system:
          - aarch64-linux
          - x86_64-linux
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: DeterminateSystems/nix-installer-action@7993355175c2765e5733dae74f3e0786fe0e5c4f # v12
      - name: Download AMI from Hydra
        id: download_ami
        run: |
          set -o pipefail
          build_id=$(curl -sSfL -H 'Accept: application/json' https://hydra.nixos.org/job/nixos/release-25.05/tested/latest-finished | jq -r '.id')
          out=$(curl -sSfL -H 'Accept: application/json' "https://hydra.nixos.org/build/${build_id}/constituents" | jq -r '.[] | select(.job == "nixos.amazonImage.${{ matrix.system }}") | .buildoutputs.out.path')
          nix-store --realise "$out" --add-root ./result
          echo "image_info=$out/nix-support/image-info.json" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Install tools
        run: |
          echo "::group::Installing coldsnap and qemu"
          nix profile install nixpkgs#coldsnap nixpkgs#qemu
          echo "::endgroup::"
          coldsnap --help | head -1
          qemu-img --version | head -1
      - name: Convert VHD to raw
        run: |
          image_file=$(jq -r '.file' < '${{ steps.download_ami.outputs.image_info }}')
          echo "Image file: $image_file"
          ls -lh "$image_file"
          echo "Converting to raw..."
          qemu-img convert -O raw "$image_file" /tmp/nixos-test.raw
          echo "Raw image:"
          ls -lh /tmp/nixos-test.raw
      - name: Network diagnostics
        run: |
          echo "=== Runner info ==="
          uname -a
          nproc
          free -h | head -2
          echo ""
          echo "=== Network to EBS endpoint ==="
          curl -so /dev/null -w "DNS: %{time_namelookup}s\nConnect: %{time_connect}s\nTLS: %{time_appconnect}s\nTotal: %{time_total}s\nHTTP code: %{http_code}\n" https://ebs.us-east-1.amazonaws.com/ || true
          echo ""
          echo "=== Network to S3 (for comparison) ==="
          curl -so /dev/null -w "DNS: %{time_namelookup}s\nConnect: %{time_connect}s\nTLS: %{time_appconnect}s\nTotal: %{time_total}s\nHTTP code: %{http_code}\n" https://s3.us-east-1.amazonaws.com/ || true
          echo ""
          echo "=== Bandwidth test (download 100MB from S3) ==="
          time curl -so /dev/null https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.1.tar.xz || true
      - name: Coldsnap upload - run 1
        timeout-minutes: 15
        run: |
          echo "=== Starting coldsnap upload run 1 at $(date -u) ==="
          export RUST_LOG=coldsnap=debug
          start=$SECONDS
          coldsnap upload /tmp/nixos-test.raw 2>&1 | tee /tmp/coldsnap-run1.log &
          PID=$!
          # Print a heartbeat every 30s so we know it's alive
          while kill -0 $PID 2>/dev/null; do
            echo "[$(date -u)] still uploading... ($(( SECONDS - start ))s elapsed)"
            sleep 30
          done
          wait $PID
          STATUS=$?
          elapsed=$(( SECONDS - start ))
          snap_id=$(tail -1 /tmp/coldsnap-run1.log)
          echo ""
          echo "=== Run 1 complete ==="
          echo "Exit code: $STATUS"
          echo "Wall time: ${elapsed}s"
          echo "Snapshot: $snap_id"
          if [ $STATUS -eq 0 ]; then
            raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
            throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
            echo "Throughput: ~${throughput} MB/s"
            aws ec2 delete-snapshot --snapshot-id "$snap_id"
          fi
      - name: Coldsnap upload - run 2
        timeout-minutes: 15
        run: |
          echo "=== Starting coldsnap upload run 2 at $(date -u) ==="
          export RUST_LOG=coldsnap=debug
          start=$SECONDS
          coldsnap upload /tmp/nixos-test.raw 2>&1 | tee /tmp/coldsnap-run2.log &
          PID=$!
          while kill -0 $PID 2>/dev/null; do
            echo "[$(date -u)] still uploading... ($(( SECONDS - start ))s elapsed)"
            sleep 30
          done
          wait $PID
          STATUS=$?
          elapsed=$(( SECONDS - start ))
          snap_id=$(tail -1 /tmp/coldsnap-run2.log)
          echo ""
          echo "=== Run 2 complete ==="
          echo "Exit code: $STATUS"
          echo "Wall time: ${elapsed}s"
          echo "Snapshot: $snap_id"
          if [ $STATUS -eq 0 ]; then
            raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
            throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
            echo "Throughput: ~${throughput} MB/s"
            aws ec2 delete-snapshot --snapshot-id "$snap_id"
          fi
      - name: Coldsnap upload - run 3
        timeout-minutes: 15
        run: |
          echo "=== Starting coldsnap upload run 3 at $(date -u) ==="
          export RUST_LOG=coldsnap=debug
          start=$SECONDS
          coldsnap upload /tmp/nixos-test.raw 2>&1 | tee /tmp/coldsnap-run3.log &
          PID=$!
          while kill -0 $PID 2>/dev/null; do
            echo "[$(date -u)] still uploading... ($(( SECONDS - start ))s elapsed)"
            sleep 30
          done
          wait $PID
          STATUS=$?
          elapsed=$(( SECONDS - start ))
          snap_id=$(tail -1 /tmp/coldsnap-run3.log)
          echo ""
          echo "=== Run 3 complete ==="
          echo "Exit code: $STATUS"
          echo "Wall time: ${elapsed}s"
          echo "Snapshot: $snap_id"
          if [ $STATUS -eq 0 ]; then
            raw_bytes=$(stat -c%s /tmp/nixos-test.raw)
            throughput=$(( raw_bytes / elapsed / 1024 / 1024 ))
            echo "Throughput: ~${throughput} MB/s"
            aws ec2 delete-snapshot --snapshot-id "$snap_id"
          fi
